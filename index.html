<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingshot Tools</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 20px auto; padding: 0 15px; }
        .box { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        textarea, input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; margin-top: 5px; }
        .id-item { background: #f4f4f4; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        .copy-btn { background: #6c757d; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; font-size: 12px; }
    </style>
</head>
<body>

    <h2>Kingshot Tools</h2>
    
    <div class="box">
        <label>1. 輸入 Gift Code (複製好備用)</label>
        <input type="text" id="giftCode" placeholder="請貼上禮包碼">
    </div>

    <div class="box">
        <textarea id="idInput" placeholder="輸入多個 Player ID (換行分隔)"></textarea>
        <button onclick="addIds()">新增 ID 列表</button>
    </div>

    <div id="idList"></div>

    <script>
        const REDEEM_URL = "https://ks-giftcode.centurygame.com/";
        let ids = JSON.parse(localStorage.getItem('kingshotIds')) || [];

        function render() {
            const list = document.getElementById('idList');
            list.innerHTML = '<h3>ID 列表 (點擊複製 ID):</h3>';
            ids.forEach((id, index) => {
                const div = document.createElement('div');
                div.className = 'id-item';
                div.innerHTML = `<span>${id}</span> 
                                 <button class="copy-btn" onclick="copyAndOpen('${id}')">複製 ID 並前往</button>`;
                div.oncontextmenu = (e) => { e.preventDefault(); removeId(index); }; // 右鍵點擊刪除
                list.appendChild(div);
            });
            localStorage.setItem('kingshotIds', JSON.stringify(ids));
        }

        async function copyAndOpen(id) {
            await navigator.clipboard.writeText(id);
            window.open(REDEEM_URL, '_blank');
        }

        function addIds() {
            const input = document.getElementById('idInput');
            const newIds = input.value.split(/[\s,]+/).filter(id => id.trim() !== "");
            ids = [...new Set([...ids, ...newIds])];
            input.value = '';
            render();
        }

        function removeId(index) { if(confirm("刪除此 ID?")) { ids.splice(index, 1); render(); } }
        render();
    </script>
</body>
</html>
