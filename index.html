<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingshot Player ID Manager</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 20px auto; padding: 0 15px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
        .id-list { margin-top: 20px; border-top: 1px solid #ccc; padding-top: 10px; }
        .id-item { background: #f4f4f4; padding: 8px; margin: 5px 0; cursor: pointer; border-radius: 4px; }
        .id-item:hover { background: #ffcccc; }
    </style>
</head>
<body>

    <h2>Kingshot Player ID Manager</h2>
    <textarea id="idInput" placeholder="請輸入 Player ID (可一次貼上多個，用換行或空格分隔)"></textarea>
    <button onclick="addIds()">新增 ID</button>

    <div class="id-list" id="idList">
        <h3>已儲存的 ID (點擊可刪除):</h3>
    </div>

    <script>
        // 載入資料
        let ids = JSON.parse(localStorage.getItem('kingshotIds')) || [];

        function render() {
            const list = document.getElementById('idList');
            list.innerHTML = '<h3>已儲存的 ID (點擊可刪除):</h3>';
            ids.forEach((id, index) => {
                const div = document.createElement('div');
                div.className = 'id-item';
                div.innerText = id;
                div.onclick = () => removeId(index);
                list.appendChild(div);
            });
            localStorage.setItem('kingshotIds', JSON.stringify(ids));
        }

        function addIds() {
            const input = document.getElementById('idInput');
            // 將輸入的內容依照換行或空格切割，並過濾掉空值
            const newIds = input.value.split(/[\s,]+/).filter(id => id.trim() !== "");
            ids = [...new Set([...ids, ...newIds])]; // 去除重複
            input.value = '';
            render();
        }

        function removeId(index) {
            ids.splice(index, 1);
            render();
        }

        render(); // 初始化頁面
    </script>
</body>
</html>
