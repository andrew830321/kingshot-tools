<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingshot Tools</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 20px auto; padding: 0 15px; }
        textarea, input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; margin-bottom: 5px; }
        .id-item { background: #f4f4f4; padding: 8px; margin: 5px 0; cursor: pointer; border-radius: 4px; display: flex; justify-content: space-between; }
        .redeem-btn { background: #28a745; font-size: 12px; padding: 2px 8px; }
    </style>
</head>
<body>

    <h2>Kingshot Tools</h2>
    <input type="text" id="giftCode" placeholder="請輸入要領取的 Gift Code">
    <textarea id="idInput" placeholder="輸入 Player ID (換行分隔)"></textarea>
    <button onclick="addIds()">新增 ID</button>

    <div id="idList">
        <h3>已儲存的 ID:</h3>
    </div>

    <script>
        // 請將此處的 URL 改成你遊戲真正的官方兌換網址
        const REDEEM_URL = "https://kingshot-official-site.com/redeem"; 

        let ids = JSON.parse(localStorage.getItem('kingshotIds')) || [];

        function render() {
            const list = document.getElementById('idList');
            list.innerHTML = '<h3>已儲存的 ID:</h3>';
            ids.forEach((id, index) => {
                const div = document.createElement('div');
                div.className = 'id-item';
                div.innerHTML = `<span>${id}</span> 
                                 <button class="redeem-btn" onclick="redeem('${id}')">兌換</button>`;
                div.onclick = (e) => { if(e.target.tagName !== 'BUTTON') removeId(index); };
                list.appendChild(div);
            });
            localStorage.setItem('kingshotIds', JSON.stringify(ids));
        }

        function redeem(id) {
            const code = document.getElementById('giftCode').value;
            if (!code) { alert("請先輸入 Gift Code"); return; }
            // 這裡自動跳轉到官方網址
            window.open(`${REDEEM_URL}?id=${id}&code=${code}`, '_blank');
        }

        function addIds() {
            const input = document.getElementById('idInput');
            const newIds = input.value.split(/[\s,]+/).filter(id => id.trim() !== "");
            ids = [...new Set([...ids, ...newIds])];
            input.value = '';
            render();
        }

        function removeId(index) { ids.splice(index, 1); render(); }
        render();
    </script>
</body>
</html>
